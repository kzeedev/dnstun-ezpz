name: Build slipstream-server (multi-arch)

on:
  workflow_dispatch:
    inputs:
      slipstream_release_tag:
        description: 'Slipstream release tag (e.g. v1.0.0 or commit SHA)'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag to push (e.g. latest or v1.0.0)'
        required: true
        type: string
        default: 'latest'

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push slipstream-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./slipstream-server.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            RELEASE_TAG=${{ inputs.slipstream_release_tag }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/slipstream-server:${{ inputs.image_tag }}
